<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Form detection (Netlify)</title>
  <meta name="robots" content="noindex, nofollow" />
</head>
<body>
  <!--
    This file exists ONLY so Netlify's HTML parser detects our forms at deploy
    time. Netlify's form-handling crawler reads static HTML; it does NOT execute
    Astro's runtime hydration. As long as one static HTML file in our deploy
    declares the form name + fields, submissions to that form will be accepted.

    Do not link to this page. It will never be shown to users — Astro pages
    render the real form via src/components/ContactForm.astro.

    If you add another form, append it here too.
  -->

  <form name="contact-de" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact-de" />
    <input type="text"   name="bot-field" />
    <input type="text"   name="name" />
    <input type="email"  name="email" />
    <input type="text"   name="subject" />
    <textarea name="message"></textarea>
  </form>

  <form name="contact-en" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact-en" />
    <input type="text"   name="bot-field" />
    <input type="text"   name="name" />
    <input type="email"  name="email" />
    <input type="text"   name="subject" />
    <textarea name="message"></textarea>
  </form>

  <form name="contact-fr" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact-fr" />
    <input type="text"   name="bot-field" />
    <input type="text"   name="name" />
    <input type="email"  name="email" />
    <input type="text"   name="subject" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
