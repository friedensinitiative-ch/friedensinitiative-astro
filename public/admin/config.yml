  # ---------------------------------------------------------------------------
  # DONATE PAGE PROSE — long-form Markdown per locale
  # ---------------------------------------------------------------------------
  # Editors use WYSIWYG to edit the introductory/explanatory paragraphs on
  # the donation page. Structural fields (IBAN, BIC, button labels) stay in
  # the locale JSON collections above.
  - name: donate-prose
    label: '📝 Spenden-Texte / Donate texts'
    description: 'Längere Fliesstexte auf der Spendenseite, pro Sprache'
    folder: 'src/content/donate'
    extension: md
    format: frontmatter
    create: false
    slug: '{{locale}}'
    fields:
      - { label: 'Sprache / Locale', name: locale, widget: select, options: ['de', 'en', 'fr'] }
      - { label: 'Inhalt / Body', name: body, widget: markdown }
