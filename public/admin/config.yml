                widget: object
                fields:
                  - { label: 'One-time', name: oneTime, widget: string }
                  - { label: Monthly,    name: monthly, widget: string }
              - label: 'Bank transfer'
                name: bank
                widget: object
                fields:
                  - { label: Title,           name: title,          widget: string }
                  - { label: 'Recipient label', name: recipient,    widget: string }
                  - { label: 'Recipient value', name: recipientValue, widget: string }
                  - { label: 'IBAN label',    name: iban,           widget: string }
                  - { label: 'IBAN value',    name: ibanValue,      widget: string }
                  - { label: 'BIC label',     name: bic,            widget: string }
                  - { label: 'BIC value',     name: bicValue,       widget: string }
                  - { label: Note,            name: note,           widget: text }
              - label: TWINT
                name: twint
                widget: object
                fields:
                  - { label: Title,     name: title,    widget: string }
                  - { label: 'Step 1',  name: step1,    widget: string }
                  - { label: 'Step 2',  name: step2,    widget: string }
                  - { label: Fallback,  name: fallback, widget: text }
              - label: 'Credit card'
                name: creditcard
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
              - label: 'Donate footer texts'
                name: footer
                widget: object
                fields:
                  - { label: 'Volunteer note', name: volunteer, widget: text }
                  - { label: 'Contact email',  name: contact,   widget: string }
                  - { label: 'Tax note',       name: tax,       widget: text }
          - label: 'Site footer'
            name: footer
            widget: object
            fields:
              - { label: Imprint,   name: imprint,   widget: string }
              - { label: Privacy,   name: privacy,   widget: string }
              - { label: Copyright, name: copyright, widget: string }

