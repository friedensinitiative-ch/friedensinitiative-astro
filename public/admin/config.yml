                widget: object
                fields:
                  - { label: Title,    name: title,    widget: string }
                  - { label: Subtitle, name: subtitle, widget: string }
              - label: Intro
                name: intro
                widget: object
                fields:
                  - { label: 'Paragraph 1', name: p1, widget: text }
                  - { label: 'Paragraph 2', name: p2, widget: text }
                  - { label: 'Paragraph 3', name: p3, widget: text }
              - label: 'Impact cards'
                name: impact
                widget: object
                fields:
                  - label: 'Why donate'
                    name: why
                    widget: object
                    fields:
                      - { label: Title, name: title, widget: string }
