# =============================================================================
# Sveltia CMS Configuration
# =============================================================================
# Backend: GitHub OAuth directly. Requires an OAuth helper deployed somewhere
# (Cloudflare Workers, Netlify Functions, etc.). The auth_endpoint below
# points to it — replace with your actual deployment URL before going live.
#
# Strategy carried over from the previous Decap setup:
#   - ONE collection per language. Each collection edits exactly one locale
#     JSON file (de.json / en.json / fr.json). This avoids merge conflicts
#     that occur when multiple files entries target the same source file.
# =============================================================================

backend:
  name: github
  repo: REPLACE-ORG/friedensinitiative-astro
  branch: main
  # OAuth helper — replace once deployed.
  # Example for Cloudflare Workers: https://your-worker.workers.dev/auth
  base_url: https://REPLACE-WITH-OAUTH-HELPER.example.com
  auth_endpoint: auth

# Optional editorial workflow (PRs instead of direct commits).
# Comment out if you want all saves to publish immediately.
publish_mode: editorial_workflow

# Media uploads land in public/uploads and are served from /uploads
media_folder: public/uploads
public_folder: /uploads

site_url: https://friedensinitiative-astro.netlify.app
display_url: https://friedensinitiative-astro.netlify.app

locale: 'de'

# =============================================================================
# COLLECTIONS
# =============================================================================

collections:

  # ---------------------------------------------------------------------------
  # GERMAN CONTENT
  # ---------------------------------------------------------------------------
  - name: content-de
    label: '🇨🇭 Deutsche Inhalte'
    label_singular: 'Deutsche Seite'
    description: 'Alle deutschen Website-Texte. Abschnittsweise bearbeiten.'
    editor:
      preview: false
    files:
      - name: de-content
        label: 'Deutsch – alle Abschnitte'
        file: 'src/i18n/locales/de.json'
        fields:
          - label: 'Navigation'
            name: nav
            widget: object
            fields:
              - { label: 'Start',     name: home,      widget: string }
              - { label: 'Über uns',  name: about,     widget: string }
              - { label: 'Maharishi', name: maharishi, widget: string, required: false }
              - { label: 'Spenden',   name: donate,    widget: string }
              - { label: 'Kontakt',   name: contact,   widget: string }

          - label: 'Hero-Bereich'
            name: hero
            widget: object
            fields:
              - { label: 'Untertitel',  name: subtitle,    widget: string }
              - { label: 'Titel',       name: title,       widget: string, hint: 'Mit {{highlight}}...{{/highlight}} können Wörter gold hervorgehoben werden.' }
              - { label: 'Beschreibung', name: description, widget: text }
              - { label: 'Scroll-Down-Hinweis', name: scrollDown, widget: string, required: false }

          - label: 'Training-Abschnitt'
            name: training
            widget: object
            fields:
              - { label: 'Titel',  name: title, widget: string, hint: 'Mit {{highlight}}...{{/highlight}} können Wörter gold hervorgehoben werden.' }
              - { label: 'Einleitung', name: intro, widget: text }
              - { label: 'Call-to-Action', name: cta, widget: string }

          - label: 'Spenden-Seite'
            name: donate
            widget: object
            fields:
              - label: 'Hero'
                name: hero
                widget: object
                fields:
                  - { label: 'Titel',     name: title,    widget: string }
                  - { label: 'Untertitel', name: subtitle, widget: string }
              - label: 'Einleitung'
                name: intro
                widget: object
                fields:
                  - { label: 'Absatz 1', name: p1, widget: text }
                  - { label: 'Absatz 2', name: p2, widget: text }
                  - { label: 'Absatz 3', name: p3, widget: text }
              - label: 'Impact Cards'
                name: impact
                widget: object
                fields:
                  - label: 'Warum spenden'
                    name: why
                    widget: object
                    fields:
                      - { label: Titel, name: title, widget: string }
                      - { label: Text,  name: text,  widget: text }
                  - label: 'Wie verwendet'
                    name: how
                    widget: object
                    fields:
                      - { label: Titel, name: title, widget: string }
                      - { label: Text,  name: text,  widget: text }
                  - label: 'Globale Wirkung'
                    name: global
                    widget: object
                    fields:
                      - { label: Titel, name: title, widget: string }
                      - { label: Text,  name: text,  widget: text }
              - label: 'Spendenoptionen'
                name: options
                widget: object
                fields:
                  - { label: 'Einmalig',  name: oneTime, widget: string }
                  - { label: 'Monatlich', name: monthly, widget: string }
              - label: 'Bankverbindung'
                name: bank
                widget: object
                fields:
                  - { label: Titel,         name: title,           widget: string }
                  - { label: 'Empfänger Label',  name: recipient,      widget: string }
                  - { label: 'Empfänger Wert',   name: recipientValue, widget: string }
                  - { label: 'IBAN Label',  name: iban,           widget: string }
                  - { label: 'IBAN Wert',   name: ibanValue,      widget: string }
                  - { label: 'BIC Label',   name: bic,            widget: string }
                  - { label: 'BIC Wert',    name: bicValue,       widget: string }
                  - { label: Hinweis,       name: note,           widget: text }
              - label: 'TWINT'
                name: twint
                widget: object
                fields:
                  - { label: Titel,      name: title,    widget: string }
                  - { label: 'Schritt 1', name: step1,    widget: string }
                  - { label: 'Schritt 2', name: step2,    widget: string }
                  - { label: Fallback,   name: fallback, widget: text }
              - label: 'Kreditkarte'
                name: creditcard
                widget: object
                fields:
                  - { label: Titel, name: title, widget: string }
              - label: 'Footer-Texte (Spenden)'
                name: footer
                widget: object
                fields:
                  - { label: 'Vorstand-Hinweis',  name: volunteer, widget: text }
                  - { label: 'Kontakt-E-Mail',    name: contact,   widget: string }
                  - { label: 'Steuerhinweis',     name: tax,       widget: text }

          - label: 'Site-Footer'
            name: footer
            widget: object
            fields:
              - { label: Impressum,  name: imprint,   widget: string }
              - { label: Datenschutz, name: privacy,  widget: string }
              - { label: Copyright,  name: copyright, widget: string }

