# =============================================================================
# Sveltia CMS Configuration
# =============================================================================
# Backend: GitHub OAuth via Cloudflare Worker (no Netlify Identity).
# Strategy: ONE collection per language. Each collection edits exactly one
# locale JSON file. Avoids merge conflicts of multiple file-entries on same
# source file. Plus a separate Markdown collection for the longer-form
# donation page prose texts.
# =============================================================================

backend:
  name: github
  repo: friedensinitiative-ch/friedensinitiative-astro
  branch: main
  base_url: https://sveltia-cms-auth.raja-felix-kaegi.workers.dev
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

site_url: https://friedensinitiative-astro.netlify.app
display_url: https://friedensinitiative-astro.netlify.app

locale: 'de'

collections:

  # ---------------------------------------------------------------------------
  # DEUTSCHE INHALTE
  # ---------------------------------------------------------------------------
  - name: content-de
    label: '🇨🇭 Deutsche Inhalte'
    label_singular: 'Deutsche Seite'
    description: 'Alle deutschen Website-Texte'
    editor: { preview: false }
    files:
      - name: de-content
        label: 'Deutsch – alle Abschnitte'
        file: 'src/i18n/locales/de.json'
        fields:
          - label: 'Navigation'
            name: nav
            widget: object
            fields:
              - { label: 'Startseite', name: home,    widget: string }
              - { label: 'Über uns',   name: about,   widget: string }
              - { label: 'Spenden',    name: donate,  widget: string }
              - { label: 'Kontakt',    name: contact, widget: string }

          - label: 'Hero-Bereich'
            name: hero
            widget: object
            fields:
              - { label: 'Untertitel',           name: subtitle,    widget: string }
              - { label: 'Titel',                name: title,       widget: string, hint: 'Mit {{highlight}}...{{/highlight}} können Wörter gold hervorgehoben werden.' }
              - { label: 'Beschreibung',         name: description, widget: text }
              - { label: 'Scroll-Down-Hinweis',  name: scrollDown,  widget: string }

          - label: 'Training-Abschnitt'
            name: training
            widget: object
            fields:
              - { label: 'Titel',     name: title,      widget: string, hint: '{{highlight}}...{{/highlight}} markiert gold-hervorgehobene Wörter' }
              - { label: 'Absatz 1',  name: paragraph1, widget: text }
              - { label: 'Absatz 2',  name: paragraph2, widget: text }
              - { label: 'Absatz 3',  name: paragraph3, widget: text }

          - label: 'Yoga-Abschnitt'
            name: yoga
            widget: object
            fields:
              - { label: 'Titel',          name: title,            widget: string, hint: '{{highlight1}}...{{/highlight1}} und {{highlight2}}...{{/highlight2}} für gold-hervorgehobene Wörter' }
              - { label: 'Absatz 1',       name: paragraph1,       widget: text }
              - { label: 'Absatz 2',       name: paragraph2,       widget: text }
              - { label: 'Zitat-Einleitung', name: quoteIntro,     widget: text }
              - { label: 'Sanskrit-Zitat', name: sanskritQuote,    widget: string }
              - { label: 'Übersetzung',    name: quoteTranslation, widget: text }
              - { label: 'Quelle',         name: quoteSource,      widget: string }
